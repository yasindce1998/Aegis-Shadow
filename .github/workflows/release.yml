name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ebpf:
    name: Build eBPF programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: ebpf-release
      - name: Install bpf-linker
        run: cargo install bpf-linker
      - name: Build offense-ebpf
        run: |
          cargo +nightly build --package offense-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
      - name: Build defense-ebpf
        run: |
          cargo +nightly build --package defense-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
      - name: Upload eBPF binaries
        uses: actions/upload-artifact@v7
        with:
          name: ebpf-binaries
          path: |
            target/bpfel-unknown-none/release/offense
            target/bpfel-unknown-none/release/defense
          retention-days: 1

  build-release:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: build-ebpf
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release
      - name: Download eBPF binaries
        uses: actions/download-artifact@v8
        with:
          name: ebpf-binaries
          path: target/bpfel-unknown-none/release
      - name: Create debug symlinks
        run: |
          mkdir -p target/bpfel-unknown-none/debug
          cp target/bpfel-unknown-none/release/offense target/bpfel-unknown-none/debug/offense
          cp target/bpfel-unknown-none/release/defense target/bpfel-unknown-none/debug/defense
      - name: Build offense (shadow)
        run: cargo build --package offense --features ebpf-bin --release
      - name: Build defense (aegis)
        run: cargo build --package defense --features ebpf-bin --release
      - name: Rename binaries
        run: |
          cp target/release/offense target/release/shadow
          cp target/release/defense target/release/aegis
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: |
            target/release/shadow
            target/release/aegis
          retention-days: 1

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v6
      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          name: release-binaries
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/shadow
            artifacts/aegis
