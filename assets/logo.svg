<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#bf5fff"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer shield -->
  <g filter="url(#glow)">
    <path d="M 60 10 L 20 28 L 20 60 C 20 85 38 102 60 110 C 82 102 100 85 100 60 L 100 28 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="2.5"/>
  </g>

  <!-- Inner dashed shield - the shadow -->
  <g filter="url(#innerGlow)">
    <path d="M 60 28 L 38 38 L 38 60 C 38 76 48 86 60 91 C 72 86 82 76 82 60 L 82 38 Z"
          fill="none" stroke="url(#innerGrad)" stroke-width="1.5" stroke-dasharray="4,5"/>
  </g>

  <!-- Central eye -->
  <circle cx="60" cy="58" r="7" fill="none" stroke="#00ffff" stroke-width="1.5" filter="url(#innerGlow)"/>
  <circle cx="60" cy="58" r="2.5" fill="#bf5fff" filter="url(#innerGlow)"/>

  <!-- Radiating probe lines -->
  <line x1="60" y1="49" x2="60" y2="35" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
  <line x1="67" y1="63" x2="77" y2="75" stroke="#bf5fff" stroke-width="1" opacity="0.5"/>
  <line x1="53" y1="63" x2="43" y2="75" stroke="#ff00ff" stroke-width="1" opacity="0.4"/>
</svg>
