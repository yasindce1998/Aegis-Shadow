  <rect x="100" y="245" width="130" height="36" rx="5" fill="#0d1a0d"
        stroke="#39ff14" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="165" y="267" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#39ff14">Command Map</text>

  <line x1="230" y1="263" x2="275" y2="263" stroke="#39ff14" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="280" y="245" width="130" height="36" rx="5" fill="#1a1015"
        stroke="#ff6b35" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="345" y="267" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#ff6b35">User-space</text>

  <line x1="410" y1="263" x2="455" y2="263" stroke="#ff6b35" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="460" y="245" width="330" height="36" rx="5" fill="#1a1015"
        stroke="#ff0055" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="625" y="267" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#ff0055">Execute: hide / unhide / obfuscate / exfil / kill</text>

  <!-- ═══ ICMP EXFIL FLOW ═══ -->
  <text x="450" y="310" font-family="'Courier New', monospace" font-size="12" font-weight="bold"
        text-anchor="middle" fill="#8b949e">ICMP EXFIL</text>

  <rect x="100" y="325" width="130" height="36" rx="5" fill="#1a1015"
        stroke="#ff6b35" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="165" y="347" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#ff6b35">User-space</text>

  <line x1="230" y1="343" x2="275" y2="343" stroke="#ff6b35" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="280" y="325" width="180" height="36" rx="5" fill="#1a0d2e"
        stroke="#bf5fff" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="370" y="347" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#bf5fff">ICMP_EXFIL_QUEUE</text>

  <line x1="460" y1="343" x2="505" y2="343" stroke="#bf5fff" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="510" y="325" width="120" height="36" rx="5" fill="#1a1015"
        stroke="#ff0055" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="570" y="347" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#ff0055">TC Egress</text>

  <line x1="630" y1="343" x2="675" y2="343" stroke="#ff0055" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="680" y="325" width="180" height="36" rx="5" fill="#0d1a0d"
        stroke="#39ff14" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="770" y="347" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#39ff14">ICMP Echo + Payload</text>

  <!-- ═══ CRED RELAY FLOW ═══ -->
  <text x="450" y="390" font-family="'Courier New', monospace" font-size="12" font-weight="bold"
        text-anchor="middle" fill="#8b949e">CREDENTIAL RELAY</text>

  <rect x="50" y="400" width="130" height="36" rx="5" fill="#0d1a0d"
        stroke="#39ff14" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="115" y="422" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#39ff14">TTY Kprobe</text>

  <line x1="180" y1="418" x2="215" y2="418" stroke="#39ff14" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="220" y="400" width="140" height="36" rx="5" fill="#1a0d2e"
        stroke="#bf5fff" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="290" y="422" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#bf5fff">CRED_EVENTS</text>

  <line x1="360" y1="418" x2="395" y2="418" stroke="#bf5fff" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="400" y="400" width="130" height="36" rx="5" fill="#1a1015"
        stroke="#ff6b35" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="465" y="422" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#ff6b35">User-space</text>

  <line x1="530" y1="418" x2="565" y2="418" stroke="#ff6b35" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="570" y="400" width="110" height="36" rx="5" fill="#1a1015"
        stroke="#ff0055" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="625" y="422" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#ff0055">Encode</text>

  <line x1="680" y1="418" x2="715" y2="418" stroke="#ff0055" stroke-width="1.2" marker-end="url(#offArrow)"/>

  <rect x="720" y="400" width="150" height="36" rx="5" fill="#0d1a0d"
        stroke="#39ff14" stroke-width="1.2" filter="url(#offSoftGlow)"/>
  <text x="795" y="422" font-family="'Courier New', monospace" font-size="9"
        text-anchor="middle" fill="#39ff14">ICMP/DNS Exfil</text>
</svg>
